name: nginx
project: default
destination:
  namespace: nginx
source:
  repoURL: https://charts.bitnami.com/bitnami
  chart: nginx
  targetRevision: 22.6.8
  helmValues: |
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      hostname: nginx.zerok3s.com
      annotations:
        external-dns.alpha.kubernetes.io/hostname: nginx.zerok3s.com
    replicaCount: 2
syncOptions:
  - CreateNamespace=true
