name: argocd
project: default
destination:
  namespace: argocd
source:
  repoURL: https://argoproj.github.io/argo-helm
  chart: argo-cd
  targetRevision: 7.7.10
  helmValues: |
    global:
      domain: argocd.local
    configs:
      params:
        server.insecure: true
syncOptions:
  - CreateNamespace=true
