name: argocd
project: default
destination:
  namespace: argocd
source:
  repoURL: https://argoproj.github.io/argo-helm
  chart: argo-cd
  targetRevision: 3.3.4
  helmValues: |
    configs:
      params:
        server.insecure: false
    server:
      replicas: 2
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - argocd.zeromnd.com
    redis:
      enabled: true
      serviceAccount:
        create: true
        automountServiceAccountToken: true
syncOptions:
  - CreateNamespace=true
