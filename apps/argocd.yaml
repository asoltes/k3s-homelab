name: argocd
project: default
destination:
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 7.7.10
    helm:
      valuesObject:
        global:
          domain: argocd.local
        configs:
          params:
            server.insecure: true
        redis:
          serviceAccount:
            create: true
            name: argocd-redis
        server:
          ingress:
            enabled: true
            ingressClassName: traefik
            hostname: argocd.local
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
