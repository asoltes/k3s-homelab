name: semaphore
project: default
destination:
  namespace: semaphore
source:
  repoURL: https://semaphoreui.github.io/charts/
  chart: semaphore
  targetRevision: 16.0.11
  helmValues: |
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      hostname: semaphore.zeromnd.com
    replicaCount: 1
syncOptions:
  - CreateNamespace=true
