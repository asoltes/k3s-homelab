name: external-dns
project: default
destination:
  namespace: external-dns
source:
  repoURL: https://kubernetes-sigs.github.io/external-dns/
  chart: external-dns
  targetRevision: 1.16.0
  helmValues: |
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/muhlba91/external-dns-provider-adguard
          tag: latest
        env:
          - name: ADGUARD_URL
            valueFrom:
              secretKeyRef:
                name: adguard-configuration
                key: url
          - name: ADGUARD_USER
            valueFrom:
              secretKeyRef:
                name: adguard-configuration
                key: user
          - name: ADGUARD_PASSWORD
            valueFrom:
              secretKeyRef:
                name: adguard-configuration
                key: password
          - name: LOG_LEVEL
            value: debug
          - name: DRY_RUN
            value: "false"
        livenessProbe:
          httpGet:
            path: /healthz
            port: "8080"
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: "8080"
          initialDelaySeconds: 10
          timeoutSeconds: 5
syncOptions:
  - CreateNamespace=true
